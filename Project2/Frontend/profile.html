<!DOCTYPE html>
<html>
<head>
  <title>Profile</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet"
  href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

<!-- Sidebar -->
<aside class="sidebar">

  <h2 class="sidebar-logo">DASK</h2>

  <nav class="sidebar-menu">
    <a href="index.html"><i class="fa fa-chart-line"></i><span>Dashboard</span></a>
    <a href="attendance.html"><i class="fa fa-calendar-check"></i><span>Attendance</span></a>
    <a href="leaves.html"><i class="fa fa-plane"></i><span>Leaves</span></a>
    <a href="reports.html"><i class="fa fa-file"></i><span>Reports</span></a>
    <a href="profile.html" class="active"><i class="fa fa-user"></i><span>Profile</span></a>
  </nav>

  <div class="sidebar-profile" id="profileMenu">
    <div class="avatar" id="navAvatar">S</div>
    <span id="navUser"></span>
     <div class="profile-dropdown" id="profileDropdown">
        <button onclick="logout()">Logout</button>
      </div>
  </div>

</aside>

<div class="main-content">

  <h1>My Profile</h1>

  <div class="profile-card">

    <div class="profile-left">
      <img id="profileImage" src="default-avatar.png">
      <input type="file" id="imageUpload">
      <p class="role-badge" id="roleBadge"></p>
    </div>

    <div class="profile-right">

      <label>Full Name</label>
      <input type="text" id="profileName">

      <label>Email</label>
      <input type="email" id="profileEmail">

      <div id="deptContainer">
        <label>Department</label>
        <input type="text" id="profileDept">
      </div>

      <button type="button" onclick="saveProfile()">Save Changes</button>

    </div>

  </div>

</div>
<script src="user.js"></script>
<script src="profile.js"></script>
<script src="userSession.js"></script>
<script>
  loadSidebarProfile();
</script>
</body>
</html>
