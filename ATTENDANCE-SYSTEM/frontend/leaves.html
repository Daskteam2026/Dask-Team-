<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Leaves</title>
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>

<!-- Top Navbar -->
<nav class="navbar">
  <div class="nav-left">
    <h2 class="logo">DASK</h2>
    <a href="/index.html">Dashboard</a>
    <a href="/attendance.html">Attendance</a>
    <a href="/leaves.html" class="active">Leaves</a>
    <a href="/reports.html">Reports</a>
  </div>

  <div class="nav-right">
    <div class="profile">
      <span>Suraj</span>
      <div class="avatar">S</div>
    </div>
  </div>
</nav>

<div class="container">
<h1 class="page-title">Leave Tracker</h1>

<!-- Tabs -->
<div class="leave-tabs">
  <button class="tab active" onclick="showTab('summary', this)">Leave Summary</button>
  <button class="tab" onclick="showTab('balance', this)">Leave Balance</button>
  <button class="tab" onclick="showTab('requests', this)">Leave Requests</button>
</div>

<!-- Top Actions -->
<div class="leave-topbar">
 <button class="apply-leave-btn" onclick="openLeaveModal()">+ Apply Leave</button>
</div>

<!-- MAIN CARD -->
<div id="summaryTab" class="leave-main-card">

  <div class="empty-state" id="emptyState">
    <img src="/static/images/empty.png" class="empty-img">
    <h3>No Leave Requests Yet</h3>
    <p>Start by applying for your first leave.</p>
    <button class="primary-btn" onclick="openLeaveModal()">Add Request</button>
  </div>

  <!-- Leave Table (Hidden initially) -->
  <table class="leave-table" id="leaveTable" style="display:none;">
    <thead>
      <tr>
        <th>Type</th>
        <th>From</th>
        <th>To</th>
        <th>Reason</th>
        <th>Status</th>
      </tr>
    </thead>
    <tbody id="leaveTableBody"></tbody>
  </table>

</div>

<div id="balanceTab" class="leave-main-card" style="display:none;">

  <div class="balance-cards">

    <div class="balance-card">
      <h3>Casual Leave</h3>
      <p>12 Days Left</p>
    </div>

    <div class="balance-card">
      <h3>Sick Leave</h3>
      <p>10 Days Left</p>
    </div>

    <div class="balance-card">
      <h3>Earned Leave</h3>
      <p>15 Days Left</p>
    </div>

  </div>

</div>

<div id="requestsTab" class="leave-main-card" style="display:none;">

  <!-- Top filter bar -->
  <div class="requests-topbar">
    <select id="statusFilter" onchange="filterRequests()">
      <option value="All">All Requests</option>
      <option value="Pending">Pending</option>
      <option value="Approved">Approved</option>
      <option value="Rejected">Rejected</option>
      <option value="Cancelled">Cancelled</option>
    </select>
  </div>

  <table class="leave-table">
    <thead>
      <tr>
        <th>Employee</th>
        <th>Type</th>
        <th>From</th>
        <th>To</th>
        <th>Reason</th>
        <th>Status</th>
        <th>Action</th>
      </tr>
    </thead>
    <tbody id="requestsTableBody"></tbody>
  </table>

</div>

<!-- APPLY LEAVE MODAL -->
<div id="leaveModal" class="modal">

  <div class="modal-content">

    <span class="close-modal" onclick="closeLeaveModal()">✕</span>

    <h2>Apply Leave</h2>

    <div class="modal-form">

  <div>
    <label>Leave Type</label>
    <select id="leaveType">
      <option>Casual Leave</option>
      <option>Sick Leave</option>
      <option>Earned Leave</option>
    </select>
  </div>

  <div>
    <label>From Date</label>
    <input type="date" id="fromDate">
  </div>

  <div>
    <label>To Date</label>
    <input type="date" id="toDate">
  </div>

  <div class="full-width">
    <label>Reason</label>
    <textarea id="reason"></textarea>
  </div>

  <div class="full-width" style="text-align:right;">
    <button type="button" class="apply-btn" onclick="applyLeave()">
  Submit Request
</button>
  </div>

</div>

  </div>
</div>

<script src="/static/js/leaves.js"></script>
<script src="/static/js/user.js"></script>
</body>
</html>
