<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Attendance</title>
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>

<!-- Top Navigation (same as dashboard) -->
<nav class="navbar">
  <div class="nav-left">
    <h2 class="logo">DASK</h2>
    <a href="/index.html">Dashboard</a>
    <a href="/attendance.html" class="active">Attendance</a>
    <a href="/leaves.html">Leaves</a>
    <a href="/reports.html">Reports</a>
  </div>

  <div class="nav-right">
    <div class="profile">
      <span>Suraj</span>
      <div class="avatar">S</div>
    </div>
  </div>
</nav>

<div class="container">
  <div class="attendance-header">
  <h1>Attendance</h1>
  <div class="date-box">
    <span>Today</span>
    <h3 id="todayDate"></h3>
  </div>
</div>

  <!-- Check In / Out Buttons -->
  <div class="attendance-actions">
    <button class="btn checkin" onclick="checkIn()">Check In</button>
    <button class="btn checkout" onclick="checkOut()">Check Out</button>
  </div>

  <!-- Status Message -->
  <p id="statusMsg"></p>

  <!-- Attendance Table -->
  <h2>Attendance History</h2>

  <table class="attendance-table">
    <thead>
      <tr>
        <th>Date</th>
        <th>Check In</th>
        <th>Check Out</th>
        <th>Status</th>
      </tr>
    </thead>
    <tbody id="attendanceBody">
    </tbody>
  </table>
</div>

<script src="/static/js/attendance.js"></script>
<script src="/static/js/user.js"></script>
</body>
</html>
