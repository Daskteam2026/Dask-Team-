<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Reports</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- Top Navigation -->
<nav class="navbar">
  <div class="nav-left">
    <h2 class="logo">DASK</h2>
    <a href="index.html">Dashboard</a>
    <a href="attendance.html">Attendance</a>
    <a href="leaves.html">Leaves</a>
    <a href="reports.html" class="active">Reports</a>
  </div>

  <div class="nav-right">
    <div class="profile" id="profileMenu">
      <span id="navUser"></span>
      <div class="avatar" id="navAvatar">S</div>
      <!-- Dropdown -->
      <div class="profile-dropdown" id="profileDropdown">
        <button onclick="logout()">Logout</button>
      </div>
    </div>
  </div>
</nav>

<div class="container">
  <h1>Reports</h1>

  <!-- Employee Selection (Admin Only) -->
  <div id="adminReportSection">
    <div class="report-filters">
      <label>Select Employee:</label>
      <select id="employeeSelect">
        <option value="">Select an employee</option>
      </select>
      <button class="btn" onclick="loadEmployeeReport()">Generate Report</button>
    </div>
  </div>

  <!-- Report Output -->
  <div class="report-output" id="reportOutput">
    <div class="report-card">
      <h3>Attendance Summary</h3>
      <div id="attendanceSummary">
        <p>Present: <span id="reportPresent">0</span></p>
        <p>Absent: <span id="reportAbsent">0</span></p>
        <p>Late: <span id="reportLate">0</span></p>
        <p>On Leave: <span id="reportOnLeave">0</span></p>
        <p>Total: <span id="reportTotal">0</span></p>
      </div>
    </div>

    <div class="report-card">
      <h3>Leave Summary</h3>
      <div id="leaveSummary">
        <p>Approved: <span id="reportApproved">0</span></p>
        <p>Pending: <span id="reportPending">0</span></p>
        <p>Rejected: <span id="reportRejected">0</span></p>
        <p>Total: <span id="reportTotalLeaves">0</span></p>
      </div>
    </div>
  </div>
</div>

<script src="js/api.js"></script>
<script src="js/user.js"></script>
<script src="js/reports.js"></script>
</body>
</html>
