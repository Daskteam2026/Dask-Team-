<!DOCTYPE html>
<html>
<head>
  <title>Smart Attendance System</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
@keyframes colorBlink {
  0%   { background-color: #ffff14; } /* Light Yellow */
  50%  { background-color: #ffffff; } /* Bright Yellow */
  100% { background-color: #ffff14; } /* Light Yellow */
}

.blink-button {
  animation: colorBlink 1s infinite;
}
</style>
</head>
<body class="landing-body">

<!-- Navbar -->
<nav class="landing-nav">
  <div class="nav-logo">DASK</div>

  <div class="nav-actions">
    <a onclick="openLogin()" class="nav-login">Login</a>
    <a onclick="openRegister()" class="nav-signup">Sign Up</a>
  </div>
</nav>

<!-- Hero Section -->
<section class="hero">

  <div class="hero-left">
    <h1>
      Manage Employee Attendance With Ease Using Our
      <span>Smart Attendance System</span>
    </h1>

    <p>
      Track employee attendance, manage leaves,
      monitor work hours and generate reports —
      all in one powerful platform.
    </p>

    <a onclick="openRegister()" class="hero-btn blink-button">Sign Up →</a>
  </div>

  <!-- Image will go here -->
  <div class="hero-right">
    <img src="/images/vlg.jpeg" alt="dashboard image">
  </div>

</section>

<!-- AUTH MODAL -->
<div id="authModal" class="modal">

  <div class="auth-box">
  <span class="close-btn" onclick="closeModal()">✕</span>

  <!-- Role Toggle -->
<div class="role-toggle">
  <button id="empBtn" class="active" onclick="setRole('employee')">Employee</button>
  <button id="adminBtn" onclick="setRole('admin')">Admin</button>
</div>

    <!-- Login Form -->
    <form id="loginForm" onsubmit="event.preventDefault(); login();">
      <h2>Login</h2>
      <input type="email" id="loginEmail" placeholder="Email" required>
      <input type="password" id="loginPass" placeholder="Password" required>
      <button type="submit">Login</button>
      <p id="registerLink">No account? <a onclick="showRegister()">Register</a></p>
    </form>

    <!-- Register Form -->
    <form id="registerForm" style="display:none;" onsubmit="event.preventDefault(); register();">
      <h2>Register</h2>
      <input type="text" id="regName" placeholder="Full Name" required>
      <input type="email" id="regEmail" placeholder="Email" required>
      <input type="password" id="regPass" placeholder="Password" required>
      <input type="number" id="salary" placeholder="Monthly Salary" required>
      <input type="text" id="department" placeholder="Department (HR / IT / Sales)" required>


      <!-- <select id="regRole">
        <option value="employee">Employee</option>
        <option value="admin">Admin</option>
      </select> -->

      <button type="submit">Register</button>
      <p>Already have account? <a onclick="showLogin()">Login</a></p>
    </form>

  </div>
</div>

<script src="/js/auth.js"></script>

</body>
</html>
