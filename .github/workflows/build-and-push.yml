name: Build and push Docker image

on:
  push:
    branches: [ main, master ]

# Allow the workflow to push packages to GitHub Container Registry
permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v2
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Build and push
      uses: docker/build-push-action@v4
      with:
        context: .
        push: true
        tags: ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}:latest

    - name: Print image
      run: echo 'Image: ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}:latest'

# Note: Configure Neon App Platform to pull this image from GitHub Container Registry
